syntax = "proto3";

package todo.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/viet34tqc/demo-go-microservice/gen/go/todo/v1;todov1";

service TodoService {
  rpc CreateTodo(CreateTodoRequest) returns (TodoResponse);
  rpc ListTodos(ListTodosRequest) returns (ListTodosResponse);
  rpc GetTodo(GetTodoRequest) returns (TodoResponse);
  rpc UpdateTodo(UpdateTodoRequest) returns (TodoResponse);
  rpc DeleteTodo(DeleteTodoRequest) returns (DeleteTodoResponse);
}

message Todo {
  uint64 id = 1;
  uint64 user_id = 2;
  string title = 3;
  bool completed = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message CreateTodoRequest {
  uint64 user_id = 1;
  string title = 2;
}

message ListTodosRequest {
  uint64 user_id = 1;
}

message ListTodosResponse {
  repeated Todo todos = 1;
}

message GetTodoRequest {
  uint64 user_id = 1;
  uint64 todo_id = 2;
}

message UpdateTodoRequest {
  uint64 user_id = 1;
  uint64 todo_id = 2;
  optional string title = 3;
  optional bool completed = 4;
}

message DeleteTodoRequest {
  uint64 user_id = 1;
  uint64 todo_id = 2;
}

message TodoResponse {
  Todo todo = 1;
}

message DeleteTodoResponse {
  bool success = 1;
}
