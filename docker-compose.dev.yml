services:
  postgres:
    image: postgres:15-alpine
    container_name: mini-maestro-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: demo_mircoservice
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d demo_mircoservice']
      interval: 5s
      timeout: 5s
      retries: 5
  gateway:
    build:
      context: .
      dockerfile: .docker/Dockerfile.dev
    container_name: mini_gateway_dev
    working_dir: /app
    volumes:
      - .:/app
      # These keep dependency downloads and rebuilds faster between container restarts.
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    ports:
      - '8080:8080'
    environment:
      - PORT=8080
      - USER_SERVICE_URL=http://user-service:8081
      - TODO_SERVICE_URL=http://todo-service:8082
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
    command: air -c cmd/gateway/.air.toml
    depends_on:
      - user-service
      - todo-service

  user-service:
    build:
      context: .
      dockerfile: .docker/Dockerfile.dev
    container_name: mini_user_service_dev
    working_dir: /app
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    ports:
      - '8081:8081'
    environment:
      - PORT=8081
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASS=postgres
      - DB_NAME=demo_mircoservice
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
    command: air -c cmd/user-service/.air.toml
    depends_on:
      postgres:
        condition: service_healthy

  todo-service:
    build:
      context: .
      dockerfile: .docker/Dockerfile.dev
    container_name: mini_todo_service_dev
    working_dir: /app
    volumes:
      - .:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    ports:
      - '8082:8082'
    environment:
      - PORT=8082
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASS=postgres
      - DB_NAME=demo_mircoservice
    command: air -c cmd/todo-service/.air.toml
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  go-mod-cache:
  go-build-cache:
